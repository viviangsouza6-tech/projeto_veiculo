<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 03- lógica da programação</title>
</head>
<body>
    <div id="geral">
        <h3>Cadastro de Veículos</h3>
        <div id="div-form">

            <form id="formDados">
                <label for="marca">Marca</label>
                <input type="text" name="marca" id="marca">

                <label for="modelo">Modelo</label>
                <input type="text" name="modelo" id="modelo">

                <label for="placa">Placa</label>
                <input type="text" name="placa" id="placa">

                <label for="anodefabricacao">Ano de fabricação</label>
                <input type="text" name="anodefabricacao" id="anodefabricacao">

                <label for="valordemercadodoveiclo">Valor de mercado do veículo</label>
                <input type="text" name="valordemercadodoveiclo" id="valordemercadodoveiclo">

                <label for="tipodecombustivel">Tipo de combustível</label>
                <input type="text" name="tipodecombustivel" id="tipodecombustivel">

                <button type="submit">Enviar</button>
                <button type="reset">Limpar</button>
            </form>
        
        </div>
    </div>
    
</body>
</html>
